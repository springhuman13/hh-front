<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js" defer></script>
    <script src="js/header.js" defer></script>
    <script src="js/hackathons.js" defer></script>
    <title>Хакатоны</title>
</head>
<body>
    <header>
        <div class="logo"><span>HA</span>HACKATHON</div>
        <div class="menu">
            <div class="active">
                <a href="index.html">Хакатоны</a>
                <div></div>
            </div>
            <div class="inactive">
                <a href="teams.html">Команды</a>
                <div></div>
            </div>
        </div>
        <div class="circles">
            <button id="notification" class="notification">
                <div class="icon"><img src="svg/inbox.svg"></div>
                <div id="notification-count" class="count"></div>
            </button>
            <a class="profile" href="auth.html" id="profile-link"><img src="img/log_in.png" id="profile-avatar"></a>
        </div>
    </header>
    <div class="content">
        <div id="notifications-popup" class="popup">
            <div class="popup-title">Уведомления</div>
            <div id="notifications-container" class="notifications-container">
            </div>
        </div>
        <div id="notification-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <p class="modal-title" id="modal-title"></p>
                <p id="modal-text"></p>
            </div>
        </div>
        <div class="left-menu">
            <div class="search-hackathon">
                <form>
                    <input type="text" placeholder="Поиск по названию" name="search" id="search-input">
                    <button onclick="handleSearch(event)"><img src="img/search.svg"></button>
                </form>
            </div>
            <form class="filter-section">
                <div class="filter-group">
                    <label class="online"><input type="checkbox" name="online" value="true">Онлайн</label>
                </div>
                
                <div class="filter-group">
                    <div class="filter-title">Организатор</div>
                    <div id="org" class="filter-content">
                    </div>
                </div>
                
                <div class="filter-group">
                    <div class="filter-title">Технологический фокус</div>
                    <div id="tf" class="filter-content">
                    </div>
                </div>
                <button class="clear_filter_btn" onclick="resetFilters(event)">Сбросить</button>
            </form>
        </div>
        <div class="hackathons-container"></div>
    </div>
</body>
</html>
