<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="script.js" defer></script>
    <title>Хакатоны</title>
</head>
<body>
    <header>
        <div class="logo"><span>HA</span>HACKATHON</div>
        <div class="menu">
            <div class="active">
                <a href="hackathons.html">Хакатоны</a>
                <div></div>
            </div>
            <div class="inactive">
                <a href="teams.html">Команды</a>
                <div></div>
            </div>
        </div>
        <div class="circles">
            <button class="notification">
                <div class="icon"><img src="svg/inbox.svg"></div>
                <div class="count">99</div>
            </button>
            <a class="profile"><img src="img/profile_photo.jpeg"></a>
        </div>
    </header>
    <div class="content">
        <div class="left-menu">
            <div class="search-hackathon">
                <form>
                    <input type="text" placeholder="Поиск по названию" name="search">
                    <button type="submit"><img src="img/search.svg"></button>
                </form>
            </div>
            <form class="filter-section">
                <div class="filter-group">
                    <label class="online"><input type="checkbox"> Онлайн</label>
                </div>
                
                <div class="filter-group">
                    <div class="filter-title">Организатор</div>
                    <div class="filter-content">
                        <label><input type="checkbox"> Яндекс (3)</label>
                        <label><input type="checkbox"> Озон (1)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                        <label><input type="checkbox"> МТС (5)</label>
                    </div>
                </div>
                
                <div class="filter-group">
                    <div class="filter-title">Технологический фокус</div>
                    <div class="filter-content">
                        <label><input type="checkbox"> Front-end (23)</label>
                        <label><input type="checkbox"> ML (32)</label>
                        <label><input type="checkbox"> AI (15)</label>
                        <label><input type="checkbox"> AI (15)</label>
                        <label><input type="checkbox"> AI (15)</label>
                        <label><input type="checkbox"> AI (15)</label>
                        <label><input type="checkbox"> AI (15)</label>
                        <label><input type="checkbox"> AI (15)</label>
                        <label><input type="checkbox"> AI (15)</label>
                    </div>
                </div>
            </form>
        </div>
        <div class="hackathons-container"></div>
    </div>
</body>
</html>
