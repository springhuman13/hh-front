<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js" defer></script>
    <script src="js/header.js" defer></script>
    <script src="js/profile.js" defer></script>
    <title>Профиль</title>
</head>
<body>
    <header>
        <div class="logo"><span>HA</span>HACKATHON</div>
        <div class="menu">
            <div class="inactive">
                <a href="index.html">Хакатоны</a>
                <div></div>
            </div>
            <div class="inactive">
                <a href="teams.html">Команды</a>
                <div></div>
            </div>
        </div>
        <div class="circles">
            <button class="notification">
                <div class="icon"><img src="svg/inbox.svg"></div>
                <div class="count" id="notification-count"></div>
            </button>
            <a class="profile" href="auth.html" id="profile-link"><img src="img/log_in.png" id="profile-avatar"></a>
        </div>
    </header>
    <div class="content">
        <div id="notifications-popup" class="popup">
            <div class="popup-title">Уведомления</div>
            <div id="notifications-container" class="notifications-container">
            </div>
        </div>
        <div id="notification-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <p id="modal-title"></p>
                <p id="modal-text"></p>
            </div>
        </div>
        <div class="profile-info">
            <div class="profile-info-left">
                <div class="profile-name">Unknown</div>
                <div class="profile-role">
                    <label for="role">Роль</label>
                    <select id="roles-select" name="roles-select">
                    </select>
                </div>
                <textarea name="profile-about-you" id="profile-about-you" class="profile-about-you" placeholder="О себе"></textarea>
                <button class="profile-save-btn" id="profile-save-btn">Сохранить</button>
                <div class="profile-intersting">
                    <div class="profile-intersting-title">
                        <p>Интересы</p>
                        <button onclick="ChangeIntersting()"><img src="img/plus-square.svg"></button>
                    </div>
                    <div class="profile-intersting-container">
                    </div>
                </div>
                <div class="profile-intersting-form" id="profile-intersting-form">
                    <p>Интересы</p>
                    <div class="profile-intersting-checkbox" id="intersting">
                    </div>
                    <div class="profile-intersting-btn">
                        <button class="profile-intersting-save-btn" onclick="SaveIntersting()">Сохранить</button>
                        <button class="profile-intersting-close-btn" onclick="CloseIntersting()">Отмена</button>
                    </div>
                </div>
                <div class="skills">
                    <div class="skills-title">
                        <p>Навыки</p>
                        <button onclick="ChangeSkills()"><img src="img/plus-square.svg"></button>
                    </div>
                    <div class="skills-container">
                    </div>
                    <div class="form-checklist" id="form-checklist">
                        <div id="form-checklist-details" class="form-checklist-details">
                        </div>
                        <div class="form-cl-buttons">
                            <button class="form-cl-create-button" onclick="createCLForm()">Сохранить</button>
                            <button class="form-cl-close-button" onclick="closeCLForm()">Отмена</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="profile-info-right">
                <img class='profile-img' src="img/profile_photo.jpeg">
                <div class="profile-git">
                    <div class="git-title">
                        <p>Git</p>
                        <img src="img/github.svg">
                        <button onclick="ChangeGit()"><img src="img/plus-square.svg"></button>
                    </div>
                    <div id="git-content" class="git-content">
                    </div>
                    <div class="git-form" id="git-form">
                        <p>Укажите свой git</p>
                        <input type="text" placeholder="" name="git_link" id="git_link">
                        <div class="git-btn">
                            <button class="git-save-btn" onclick="SaveGit()">Сохранить</button>
                            <button class="git-close-btn" onclick="CloseGit()">Отмена</button>
                        </div>
                    </div>
                </div>
                <div class="profile-docs">
                    <form id="upload-form" enctype="multipart/form-data">
                        <p>Сертификаты</p>
                        <div class="file-upload">
                            <img src="img/plus-square.svg" onclick="document.getElementById('certificateFile').click()">
                            <input type="file" name="certificateFile" id="certificateFile" accept=".pdf,.doc,.docx">
                        </div>
                    </form>
                    <ul id="certificate-list">
                    </ul>
                </div>
            </div>
        </div>
        <div class="rignt-menu">
            <div class="rignt-menu-top">
                <div class="my-teams-title">Мои команды</div>
                <button class="btn-create-team"><img src="img/create_team.svg">Создать команду</button>
            </div>
            <div class="my-teams" id="teams-container">
            </div>
        </div>
    </div>
</body>
</html>
